---
- name: Configure Minecraft Server
  hosts: minecraft
  become: true

  vars:
    minecraft_dir: /opt/minecraft/server
    minecraft_user: minecraft
    minecraft_memory: 2G
    rcon_password: "{{ lookup('env', 'RCON_PASSWORD') }}"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - openjdk-21-jre-headless
          - curl
          - jq
          - git
          - build-essential
        state: present

    - name: Create minecraft user
      ansible.builtin.user:
        name: "{{ minecraft_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ minecraft_dir }}"
        create_home: false

    - name: Create Minecraft directory
      ansible.builtin.file:
        path: "{{ minecraft_dir }}"
        state: directory
        owner: "{{ minecraft_user }}"
        group: "{{ minecraft_user }}"
        mode: "0755"

    - name: Download Minecraft version manifest
      ansible.builtin.get_url:
        url: https://piston-meta.mojang.com/mc/game/version_manifest_v2.json
        dest: /tmp/version_manifest_v2.json
        mode: "0644"

    - name: Get Minecraft 1.21.4 server download URL
      ansible.builtin.shell: |
        set -e
        VERSION_URL=$(jq -r '.versions[] | select(.id=="1.21.4") | .url' /tmp/version_manifest_v2.json)
        curl -s "$VERSION_URL" | jq -r '.downloads.server.url'
      args:
        executable: /bin/bash
      register: minecraft_server_url
      changed_when: false

    - name: Download Minecraft server jar
      ansible.builtin.get_url:
        url: "{{ minecraft_server_url.stdout }}"
        dest: "{{ minecraft_dir }}/server.jar"
        owner: "{{ minecraft_user }}"
        group: "{{ minecraft_user }}"
        mode: "0644"

    - name: Accept Minecraft EULA
      ansible.builtin.copy:
        dest: "{{ minecraft_dir }}/eula.txt"
        content: "eula=true\n"
        owner: "{{ minecraft_user }}"
        group: "{{ minecraft_user }}"
        mode: "0644"

    - name: Create server.properties
      ansible.builtin.template:
        src: templates/server.properties.j2
        dest: "{{ minecraft_dir }}/server.properties"
        owner: "{{ minecraft_user }}"
        group: "{{ minecraft_user }}"
        mode: "0600"

    - name: Clone mcrcon source
      ansible.builtin.git:
        repo: https://github.com/Tiiffi/mcrcon.git
        dest: /tmp/mcrcon
        version: master

    - name: Build mcrcon
      ansible.builtin.command:
        cmd: make
        chdir: /tmp/mcrcon
      changed_when: true

    - name: Install mcrcon
      ansible.builtin.copy:
        src: /tmp/mcrcon/mcrcon
        dest: /usr/local/bin/mcrcon
        remote_src: true
        owner: root
        group: root
        mode: "0755"

    - name: Create systemd service
      ansible.builtin.template:
        src: templates/minecraft.service.j2
        dest: /etc/systemd/system/minecraft.service
        owner: root
        group: root
        mode: "0644"

    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Enable and start Minecraft service
      ansible.builtin.systemd_service:
        name: minecraft
        enabled: true
        state: started
